<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <!-- 双子座卡通形象 — 两个小孩手牵手 -->

  <!-- ===== 左边小孩（卡斯托尔）===== -->
  <!-- 身体 -->
  <ellipse cx="75" cy="270" rx="32" ry="42" fill="#60A5FA" stroke="#2563EB" stroke-width="2.5"/>
  <!-- 左腿 -->
  <rect x="52" y="300" width="18" height="50" rx="9" fill="#60A5FA" stroke="#2563EB" stroke-width="2"/>
  <rect x="76" y="300" width="18" height="50" rx="9" fill="#60A5FA" stroke="#2563EB" stroke-width="2"/>
  <!-- 鞋子 -->
  <ellipse cx="61" cy="352" rx="12" ry="7" fill="#1E3A8A"/>
  <ellipse cx="85" cy="352" rx="12" ry="7" fill="#1E3A8A"/>
  <!-- 右臂（牵手） -->
  <path d="M105 258 Q130 258 135 265" fill="none" stroke="#60A5FA" stroke-width="14" stroke-linecap="round"/>
  <path d="M105 258 Q130 258 135 265" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <!-- 左臂 -->
  <path d="M45 258 Q22 248 15 240" fill="none" stroke="#60A5FA" stroke-width="14" stroke-linecap="round"/>
  <path d="M45 258 Q22 248 15 240" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <!-- 头 -->
  <circle cx="75" cy="195" r="40" fill="#FEF3C7" stroke="#D97706" stroke-width="2.5"/>
  <!-- 头发（蓝色短发） -->
  <ellipse cx="75" cy="162" rx="36" ry="16" fill="#1D4ED8"/>
  <ellipse cx="44" cy="178" rx="14" ry="20" fill="#1D4ED8" transform="rotate(-20 44 178)"/>
  <ellipse cx="106" cy="178" rx="14" ry="20" fill="#1D4ED8" transform="rotate(20 106 178)"/>
  <!-- 眼睛 -->
  <ellipse cx="63" cy="192" rx="10" ry="10" fill="white"/>
  <ellipse cx="87" cy="192" rx="10" ry="10" fill="white"/>
  <circle cx="65" cy="193" r="6" fill="#1C1917"/>
  <circle cx="89" cy="193" r="6" fill="#1C1917"/>
  <circle cx="67" cy="191" r="2.5" fill="white"/>
  <circle cx="91" cy="191" r="2.5" fill="white"/>
  <!-- 嘴巴（开心） -->
  <path d="M65 208 Q75 216 85 208" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <!-- 星符 -->
  <text x="75" y="240" text-anchor="middle" font-size="14" fill="#FBBF24" font-weight="bold">★</text>

  <!-- ===== 牵手处（中间金色握手圆） ===== -->
  <circle cx="140" cy="267" r="10" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>

  <!-- ===== 右边小孩（波吕丢刻斯）===== -->
  <!-- 身体 -->
  <ellipse cx="205" cy="270" rx="32" ry="42" fill="#F472B6" stroke="#BE185D" stroke-width="2.5"/>
  <!-- 右腿 -->
  <rect x="182" y="300" width="18" height="50" rx="9" fill="#F472B6" stroke="#BE185D" stroke-width="2"/>
  <rect x="206" y="300" width="18" height="50" rx="9" fill="#F472B6" stroke="#BE185D" stroke-width="2"/>
  <!-- 鞋子 -->
  <ellipse cx="191" cy="352" rx="12" ry="7" fill="#9D174D"/>
  <ellipse cx="215" cy="352" rx="12" ry="7" fill="#9D174D"/>
  <!-- 左臂（牵手） -->
  <path d="M175 258 Q150 258 145 265" fill="none" stroke="#F472B6" stroke-width="14" stroke-linecap="round"/>
  <path d="M175 258 Q150 258 145 265" fill="none" stroke="#BE185D" stroke-width="2" stroke-linecap="round"/>
  <!-- 右臂 -->
  <path d="M235 258 Q258 248 265 240" fill="none" stroke="#F472B6" stroke-width="14" stroke-linecap="round"/>
  <path d="M235 258 Q258 248 265 240" fill="none" stroke="#BE185D" stroke-width="2" stroke-linecap="round"/>
  <!-- 头 -->
  <circle cx="205" cy="195" r="40" fill="#FEF3C7" stroke="#D97706" stroke-width="2.5"/>
  <!-- 头发（粉色卷发） -->
  <ellipse cx="205" cy="162" rx="36" ry="16" fill="#DB2777"/>
  <ellipse cx="175" cy="177" rx="14" ry="20" fill="#DB2777" transform="rotate(-15 175 177)"/>
  <ellipse cx="235" cy="177" rx="14" ry="20" fill="#DB2777" transform="rotate(15 235 177)"/>
  <!-- 卷发装饰 -->
  <circle cx="175" cy="162" r="8" fill="#EC4899"/>
  <circle cx="234" cy="162" r="8" fill="#EC4899"/>
  <!-- 眼睛 -->
  <ellipse cx="193" cy="192" rx="10" ry="10" fill="white"/>
  <ellipse cx="217" cy="192" rx="10" ry="10" fill="white"/>
  <circle cx="195" cy="193" r="6" fill="#1C1917"/>
  <circle cx="219" cy="193" r="6" fill="#1C1917"/>
  <circle cx="197" cy="191" r="2.5" fill="white"/>
  <circle cx="221" cy="191" r="2.5" fill="white"/>
  <!-- 嘴巴（开心） -->
  <path d="M195 208 Q205 216 215 208" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <!-- 星符 -->
  <text x="205" y="240" text-anchor="middle" font-size="14" fill="#FBBF24" font-weight="bold">★</text>

  <!-- 双子座符号 -->
  <text x="140" y="395" text-anchor="middle" font-size="22" fill="#7C3AED" font-family="serif" font-weight="bold">♊</text>
</svg>
