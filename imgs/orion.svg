<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420" width="280" height="420" role="img">
  <title>猎户座猎人</title>
  <desc>儿童友好型卡通猎户：头盔羽冠、皮甲、腰带三星、盾牌、弓箭、宝剑</desc>

  <g transform="translate(140, 210)">

    <!-- ===== 左臂持盾 ===== -->
    <ellipse cx="-95" cy="-40" rx="34" ry="42" fill="#7C3AED" stroke="#A78BFA" stroke-width="2.5"/>
    <ellipse cx="-95" cy="-40" rx="24" ry="32" fill="none" stroke="#C4B5FD" stroke-width="1.5"/>
    <line x1="-95" y1="-72" x2="-95" y2="-8" stroke="#C4B5FD" stroke-width="1.5"/>
    <line x1="-129" y1="-40" x2="-61" y2="-40" stroke="#C4B5FD" stroke-width="1.5"/>
    <circle cx="-95" cy="-40" r="5" fill="#FBBF24"/>
    <!-- 左臂 -->
    <path d="M -50 -62 Q -70 -55 -80 -30" fill="none" stroke="#6D28D9" stroke-width="14" stroke-linecap="round"/>

    <!-- ===== 右臂持弓 ===== -->
    <!-- 弓 -->
    <path d="M 72 -100 Q 115 -50 72 20" fill="none" stroke="#92400E" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="-100" x2="72" y2="20" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- 箭 -->
    <line x1="78" y1="-42" x2="112" y2="-78" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <polygon points="112,-78 102,-73 107,-63" fill="#FBBF24"/>
    <!-- 右臂 -->
    <path d="M 50 -62 Q 62 -55 68 -30" fill="none" stroke="#6D28D9" stroke-width="14" stroke-linecap="round"/>

    <!-- ===== 双腿 ===== -->
    <!-- 左腿 -->
    <path d="M -20 82 L -28 160 L -12 170 L -4 92" fill="#4C1D95" stroke="#7C3AED" stroke-width="2"/>
    <!-- 右腿 -->
    <path d="M 20 82 L 28 160 L 12 170 L 4 92" fill="#4C1D95" stroke="#7C3AED" stroke-width="2"/>
    <!-- 左靴 -->
    <rect x="-34" y="160" width="36" height="16" rx="8" fill="#312E81" stroke="#4338CA" stroke-width="1.5"/>
    <!-- 右靴 -->
    <rect x="-2" y="160" width="36" height="16" rx="8" fill="#312E81" stroke="#4338CA" stroke-width="1.5"/>

    <!-- ===== 躯干（皮甲） ===== -->
    <path d="M -46 -64 Q -50 -28 -44 0 L -26 82 Q 0 92 26 82 L 44 0 Q 50 -28 46 -64 Q 18 -74 0 -76 Q -18 -74 -46 -64 Z" fill="#5B21B6" stroke="#7C3AED" stroke-width="2.5"/>
    <!-- 胸甲纹理线 -->
    <path d="M -32 -36 Q 0 -46 32 -36" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M -34 -12 Q 0 -22 34 -12" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M -30 12 Q 0 2 30 12" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <ellipse cx="0" cy="-30" rx="16" ry="20" fill="#7C3AED" opacity="0.5"/>

    <!-- ===== 腰带（三颗腰带星） ===== -->
    <rect x="-48" y="50" width="96" height="20" rx="10" fill="#92400E" stroke="#FBBF24" stroke-width="2"/>
    <!-- 三颗金星对应参宿三星 -->
    <circle cx="-26" cy="60" r="7" fill="#FBBF24" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="0"   cy="60" r="7" fill="#FBBF24" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="26"  cy="60" r="7" fill="#FBBF24" stroke="#F59E0B" stroke-width="1.5"/>
    <!-- 腰带宝剑 -->
    <rect x="36" y="64" width="6" height="42" rx="3" fill="#94A3B8"/>
    <rect x="28" y="64" width="22" height="7" rx="3" fill="#64748B"/>
    <polygon points="39,106 43,128 36,106" fill="#CBD5E1"/>

    <!-- ===== 肩甲 ===== -->
    <ellipse cx="-50" cy="-65" rx="20" ry="14" fill="#6D28D9" stroke="#8B5CF6" stroke-width="2" transform="rotate(-15,-50,-65)"/>
    <ellipse cx="50"  cy="-65" rx="20" ry="14" fill="#6D28D9" stroke="#8B5CF6" stroke-width="2" transform="rotate(15,50,-65)"/>

    <!-- ===== 头盔 ===== -->
    <ellipse cx="0" cy="-104" rx="38" ry="36" fill="#4C1D95" stroke="#7C3AED" stroke-width="3"/>
    <!-- 头盔面甲下沿 -->
    <path d="M -30 -94 Q -32 -68 -18 -66 Q 0 -64 18 -66 Q 32 -68 30 -94" fill="#3B0764" stroke="#6D28D9" stroke-width="2"/>
    <!-- 眼缝（发光金色） -->
    <rect x="-22" y="-92" width="18" height="5" rx="2.5" fill="#FBBF24" opacity="0.9"/>
    <rect x="4"   y="-92" width="18" height="5" rx="2.5" fill="#FBBF24" opacity="0.9"/>
    <!-- 头盔高光 -->
    <ellipse cx="-10" cy="-118" rx="7" ry="9" fill="#7C3AED" opacity="0.7"/>
    <!-- 头盔顶金星 -->
    <circle cx="0" cy="-142" r="4" fill="#FBBF24"/>
    <!-- 羽冠 -->
    <path d="M -8 -138 Q -6 -168 0 -182 Q 6 -168 8 -138" fill="#EF4444" stroke="#DC2626" stroke-width="1.5"/>
    <path d="M -3 -138 Q 0 -175 0 -186 Q 0 -170 3 -138" fill="#FCA5A5" opacity="0.8"/>

    <!-- ===== 装饰星光 ===== -->
    <circle cx="-70" cy="-120" r="2.5" fill="#FBBF24" opacity="0.9"/>
    <circle cx="80"  cy="-108" r="2.5" fill="#FBBF24" opacity="0.9"/>
    <circle cx="-110" cy="10"  r="2"   fill="#C4B5FD" opacity="0.7"/>
    <circle cx="106"  cy="18"  r="2"   fill="#C4B5FD" opacity="0.7"/>
    <circle cx="-78" cy="130"  r="2"   fill="#FBBF24" opacity="0.7"/>
    <circle cx="80"  cy="128"  r="2"   fill="#FBBF24" opacity="0.7"/>

  </g>
</svg>
