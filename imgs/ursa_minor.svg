<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <!-- 小熊座：可爱小熊，头顶有北极星，尾巴翘起 -->
  
  <!-- 尾巴（对应小北斗七星的斗柄） -->
  <path d="M 140 80 Q 115 95 100 120 Q 88 148 95 170" 
        stroke="#8B5CF6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 身体（胖圆形） -->
  <ellipse cx="140" cy="255" rx="62" ry="52" fill="#C4A265" stroke="#A07840" stroke-width="3"/>
  <!-- 肚皮浅色 -->
  <ellipse cx="140" cy="268" rx="38" ry="32" fill="#DFC08A"/>
  
  <!-- 四条腿 -->
  <rect x="100" y="295" width="22" height="42" rx="11" fill="#C4A265" stroke="#A07840" stroke-width="2"/>
  <rect x="158" y="295" width="22" height="42" rx="11" fill="#C4A265" stroke="#A07840" stroke-width="2"/>
  <rect x="93" y="285" width="20" height="38" rx="10" fill="#C4A265" stroke="#A07840" stroke-width="2"/>
  <rect x="167" y="285" width="20" height="38" rx="10" fill="#C4A265" stroke="#A07840" stroke-width="2"/>
  
  <!-- 爪子 -->
  <ellipse cx="111" cy="340" rx="12" ry="8" fill="#A07840"/>
  <ellipse cx="169" cy="340" rx="12" ry="8" fill="#A07840"/>
  
  <!-- 头部 -->
  <circle cx="140" cy="192" r="48" fill="#C4A265" stroke="#A07840" stroke-width="3"/>
  
  <!-- 耳朵 -->
  <circle cx="108" cy="160" r="16" fill="#C4A265" stroke="#A07840" stroke-width="2.5"/>
  <circle cx="172" cy="160" r="16" fill="#C4A265" stroke="#A07840" stroke-width="2.5"/>
  <circle cx="108" cy="160" r="9" fill="#E8A090"/>
  <circle cx="172" cy="160" r="9" fill="#E8A090"/>
  
  <!-- 脸部 -->
  <circle cx="125" cy="188" r="8" fill="#2D1A0E"/><!-- 左眼 -->
  <circle cx="155" cy="188" r="8" fill="#2D1A0E"/><!-- 右眼 -->
  <circle cx="127" cy="186" r="3" fill="white"/>
  <circle cx="157" cy="186" r="3" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="140" cy="203" rx="9" ry="6" fill="#5D2E0C"/>
  <!-- 嘴巴 -->
  <path d="M 133 210 Q 140 218 147 210" stroke="#5D2E0C" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 小胡须 -->
  <line x1="118" y1="205" x2="105" y2="202" stroke="#A07840" stroke-width="1.5" opacity="0.7"/>
  <line x1="118" y1="210" x2="104" y2="210" stroke="#A07840" stroke-width="1.5" opacity="0.7"/>
  <line x1="162" y1="205" x2="175" y2="202" stroke="#A07840" stroke-width="1.5" opacity="0.7"/>
  <line x1="162" y1="210" x2="176" y2="210" stroke="#A07840" stroke-width="1.5" opacity="0.7"/>
  
  <!-- 翘起的小尾巴 -->
  <path d="M 192 258 Q 215 240 220 220 Q 225 200 218 188" 
        stroke="#C4A265" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 192 258 Q 215 240 220 220 Q 225 200 218 188" 
        stroke="#A07840" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.3"/>
  
  <!-- 北极星（尾尖顶端发光的星） -->
  <circle cx="95" cy="170" r="14" fill="#FBBF24" opacity="0.3"/>
  <circle cx="95" cy="170" r="9" fill="#FBBF24"/>
  <!-- 星芒 -->
  <line x1="95" y1="154" x2="95" y2="162" stroke="#FBBF24" stroke-width="2.5"/>
  <line x1="95" y1="178" x2="95" y2="186" stroke="#FBBF24" stroke-width="2.5"/>
  <line x1="79" y1="170" x2="87" y2="170" stroke="#FBBF24" stroke-width="2.5"/>
  <line x1="103" y1="170" x2="111" y2="170" stroke="#FBBF24" stroke-width="2.5"/>
  <line x1="84" y1="159" x2="89" y2="164" stroke="#FBBF24" stroke-width="2"/>
  <line x1="101" y1="176" x2="106" y2="181" stroke="#FBBF24" stroke-width="2"/>
  
  <!-- 北极星标注 -->
  <text x="95" y="143" font-family="Fredoka One, sans-serif" font-size="11" fill="#FBBF24" text-anchor="middle" font-weight="bold">北极星</text>
  
  <!-- 北斗七星小图（身体上） -->
  <circle cx="124" cy="250" r="3" fill="#FBBF24" opacity="0.8"/>
  <circle cx="136" cy="248" r="3" fill="#FBBF24" opacity="0.8"/>
  <circle cx="148" cy="250" r="3" fill="#FBBF24" opacity="0.8"/>
  <circle cx="157" cy="257" r="2.5" fill="#FBBF24" opacity="0.8"/>
  <line x1="124" y1="250" x2="136" y2="248" stroke="#FBBF24" stroke-width="1.2" opacity="0.7"/>
  <line x1="136" y1="248" x2="148" y2="250" stroke="#FBBF24" stroke-width="1.2" opacity="0.7"/>
  <line x1="148" y1="250" x2="157" y2="257" stroke="#FBBF24" stroke-width="1.2" opacity="0.7"/>
  
  <!-- ♻ 小熊符号 -->
  <text x="140" y="290" font-family="Fredoka One, sans-serif" font-size="13" fill="#8B5CF6" text-anchor="middle" opacity="0.8">小北斗</text>
</svg>