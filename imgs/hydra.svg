<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <!-- 长蛇座：超长的海蛇/水蛇，弯曲的S形身体 -->
  
  <!-- 长蛇的超长身体（从左到右横跨整个画面，是全天最大星座！） -->
  <!-- 尾部 -->
  <path d="M 255 370 Q 248 345 240 330 Q 230 315 225 295" 
        stroke="#1D6B8F" stroke-width="18" fill="none" stroke-linecap="round"/>
  
  <!-- 中段身体（S形弯曲） -->
  <path d="M 225 295 Q 215 270 200 260 Q 180 248 165 255 Q 148 262 140 255 Q 125 245 108 252 Q 90 260 78 248 Q 62 235 58 210" 
        stroke="#2196B2" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 前段身体 -->
  <path d="M 58 210 Q 52 185 58 165 Q 65 145 72 130" 
        stroke="#1D6B8F" stroke-width="20" fill="none" stroke-linecap="round"/>
  
  <!-- 蛇鳞纹（多个位置） -->
  <path d="M 210 268 Q 215 260 220 268" stroke="#0E4A6A" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 195 256 Q 200 248 205 256" stroke="#0E4A6A" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 160 258 Q 165 250 170 258" stroke="#0E4A6A" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 140 252 Q 145 244 150 252" stroke="#0E4A6A" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 118 254 Q 122 246 126 254" stroke="#0E4A6A" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 88 258 Q 92 250 96 258" stroke="#0E4A6A" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 68 232 Q 72 224 76 232" stroke="#0E4A6A" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- 蛇头 -->
  <ellipse cx="72" cy="108" rx="28" ry="22" fill="#1D8A5A" stroke="#0E5A38" stroke-width="3"/>
  <!-- 蛇颌（下颌宽） -->
  <path d="M 52 115 Q 72 130 92 115" fill="#1A6B48" stroke="#0E5A38" stroke-width="2"/>
  <!-- 眼睛（双眼，蛇的特征） -->
  <ellipse cx="60" cy="103" rx="7" ry="9" fill="#FBBF24"/>
  <ellipse cx="60" cy="103" rx="3" ry="7" fill="#1A0A00"/><!-- 竖瞳 -->
  <ellipse cx="84" cy="103" rx="7" ry="9" fill="#FBBF24"/>
  <ellipse cx="84" cy="103" rx="3" ry="7" fill="#1A0A00"/>
  <circle cx="58" cy="100" r="2" fill="white"/>
  <circle cx="82" cy="100" r="2" fill="white"/>
  
  <!-- 分叉舌头 -->
  <path d="M 68 128 Q 65 138 60 145" stroke="#EF4444" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 68 128 Q 71 138 76 145" stroke="#EF4444" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 舌头根部 -->
  <line x1="72" y1="126" x2="68" y2="128" stroke="#EF4444" stroke-width="3"/>
  
  <!-- 蛇头顶部花纹 -->
  <path d="M 58 90 Q 72 82 86 90" stroke="#0E5A38" stroke-width="2.5" fill="none"/>
  <path d="M 62 84 Q 72 78 82 84" stroke="#0E5A38" stroke-width="2" fill="none"/>
  
  <!-- 全天最长！标注 -->
  <text x="155" y="50" font-family="Fredoka One, sans-serif" font-size="11" fill="#2196B2" text-anchor="middle" font-weight="bold">全天最长的星座！</text>
  
  <!-- 长度示意箭头 -->
  <line x1="30" y1="60" x2="255" y2="60" stroke="#2196B2" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,4"/>
  <polygon points="260,60 250,55 250,65" fill="#2196B2" opacity="0.6"/>
  <polygon points="25,60 35,55 35,65" fill="#2196B2" opacity="0.6"/>
  <text x="140" y="78" font-family="Fredoka One, sans-serif" font-size="9.5" fill="#5AB5C4" text-anchor="middle">横跨100度天空</text>
  
  <!-- 肱宿一星标（最亮星） -->
  <circle cx="165" cy="255" r="10" fill="#FBBF24" opacity="0.3"/>
  <circle cx="165" cy="255" r="6" fill="#FBBF24"/>
  <text x="165" y="240" font-family="Fredoka One, sans-serif" font-size="9" fill="#FBBF24" text-anchor="middle" font-weight="bold">星宿一</text>
  
  <!-- 尾巴尖 -->
  <circle cx="255" cy="370" r="8" fill="#0E4A6A" opacity="0.8"/>
</svg>