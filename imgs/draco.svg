  <path d="M95 132 L98 140 L101 132" fill="#E2E8F0" stroke="none"/>
  <path d="M108 135 L112 143 L116 135" fill="#E2E8F0" stroke="none"/>
  <path d="M122 135 L126 142 L130 135" fill="#E2E8F0" stroke="none"/>
  <!-- 舌头 -->
  <path d="M100 142 Q114 152 128 142 Q118 148 114 144" fill="#EF4444" stroke="none"/>

