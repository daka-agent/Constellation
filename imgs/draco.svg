  <path d="M50 228 Q42 185 58 155 Q72 128 100 120" stroke="#6D28D9" stroke-width="36" stroke-linecap="round" fill="none"/>
  <path d="M50 228 Q42 185 58 155 Q72 128 100 120" stroke="#7C3AED" stroke-width="28" stroke-linecap="round" fill="none"/>
  <path d="M50 228 Q42 185 58 155 Q72 128 100 120" stroke="#A78BFA" stroke-width="18" stroke-linecap="round" fill="none"/>

