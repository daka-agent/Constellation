<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </radialGradient>
  </defs>
  <rect width="280" height="420" fill="url(#bgGrad)"/>
  <circle cx="50" cy="45" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="220" cy="55" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="200" r="1" fill="#fff" opacity="0.5"/>
  <!-- Human torso -->
  <rect x="125" y="155" width="30" height="50" rx="10" fill="#ffdbac" stroke="#d4a86a" stroke-width="2"/>
  <!-- Head -->
  <circle cx="140" cy="135" r="28" fill="#ffdbac" stroke="#d4a86a" stroke-width="2"/>
  <!-- Hair -->
  <path d="M112,135 Q110,110 140,105 Q170,110 168,135" fill="#4a3728" stroke="#3a2718" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="130" cy="133" r="5" fill="#fff"/>
  <circle cx="150" cy="133" r="5" fill="#fff"/>
  <circle cx="131" cy="133" r="3" fill="#2a1a0a"/>
  <circle cx="151" cy="133" r="3" fill="#2a1a0a"/>
  <!-- Smile -->
  <path d="M135,143 Q140,150 145,143" fill="none" stroke="#d4a86a" stroke-width="2" stroke-linecap="round"/>
  <!-- Horse body -->
  <ellipse cx="140" cy="300" rx="55" ry="35" fill="#8B4513" stroke="#5a2d0c" stroke-width="3"/>
  <ellipse cx="140" cy="295" rx="40" ry="25" fill="#a0522d"/>
  <!-- Horse legs -->
  <rect x="95" y="325" width="12" height="45" rx="6" fill="#8B4513"/>
  <rect x="112" y="330" width="12" height="40" rx="6" fill="#8B4513"/>
  <rect x="156" y="330" width="12" height="40" rx="6" fill="#5a2d0c"/>
  <rect x="173" y="325" width="12" height="45" rx="6" fill="#5a2d0c"/>
  <!-- Hooves -->
  <ellipse cx="101" cy="372" rx="8" ry="5" fill="#2a1506"/>
  <ellipse cx="179" cy="372" rx="8" ry="5" fill="#2a1506"/>
  <!-- Horse tail -->
  <path d="M85,295 Q60,280 55,260 Q65,270 70,280 Q75,290 85,295" fill="#5a2d0c" stroke="#3a1a06" stroke-width="1.5"/>
  <!-- Bow -->
  <path d="M105,175 Q85,200 90,240" fill="none" stroke="#8B4513" stroke-width="4"/>
  <line x1="90" y1="175" x2="90" y2="240" stroke="#ccc" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Arms -->
  <line x1="125" y1="170" x2="105" y2="200" stroke="#ffdbac" stroke-width="7" stroke-linecap="round"/>
  <line x1="155" y1="170" x2="175" y2="200" stroke="#ffdbac" stroke-width="7" stroke-linecap="round"/>
  <text x="140" y="400" text-anchor="middle" fill="#a0522d" font-family="Fredoka, sans-serif" font-size="14" font-weight="bold">半人马座 🏹</text>
</svg>
