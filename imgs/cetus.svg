<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </radialGradient>
  </defs>
  <rect width="280" height="420" fill="url(#bgGrad)"/>
  <circle cx="50" cy="50" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="210" cy="35" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="230" cy="120" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="40" cy="130" r="1.5" fill="#fff" opacity="0.3"/>
  <!-- Body -->
  <ellipse cx="140" cy="260" rx="80" ry="50" fill="#5b9bd5" stroke="#3a7bc8" stroke-width="3"/>
  <ellipse cx="140" cy="255" rx="55" ry="35" fill="#7ec8e3"/>
  <!-- Belly -->
  <ellipse cx="140" cy="275" rx="40" ry="25" fill="#b8e6f0"/>
  <!-- Tail -->
  <path d="M60,260 Q30,240 25,280 Q20,320 50,300" fill="none" stroke="#3a7bc8" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="25" cy="280" rx="20" ry="12" fill="#5b9bd5" stroke="#3a7bc8" stroke-width="2" transform="rotate(-20,25,280)"/>
  <!-- Head -->
  <ellipse cx="220" cy="235" rx="35" ry="30" fill="#5b9bd5" stroke="#3a7bc8" stroke-width="3"/>
  <ellipse cx="225" cy="235" rx="22" ry="20" fill="#7ec8e3"/>
  <!-- Eye -->
  <circle cx="232" cy="228" r="8" fill="#fff"/>
  <circle cx="233" cy="228" r="5" fill="#1a1a4e"/>
  <circle cx="234" cy="226" r="2" fill="#fff"/>
  <!-- Smile -->
  <path d="M225,242 Q235,250 242,242" fill="none" stroke="#3a7bc8" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheek -->
  <circle cx="214" cy="238" r="6" fill="#ff9999" opacity="0.4"/>
  <!-- Water spout -->
  <path d="M255,225 Q265,200 260,180" stroke="#a0d8ef" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M260,225 Q272,205 268,185" stroke="#a0d8ef" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Flippers -->
  <ellipse cx="100" cy="290" rx="25" ry="10" fill="#5b9bd5" stroke="#3a7bc8" stroke-width="2" transform="rotate(-15,100,290)"/>
  <ellipse cx="180" cy="295" rx="25" ry="10" fill="#5b9bd5" stroke="#3a7bc8" stroke-width="2" transform="rotate(10,180,295)"/>
  <!-- Water droplets -->
  <circle cx="260" cy="175" r="4" fill="#a0d8ef" opacity="0.6"/>
  <circle cx="268" cy="170" r="3" fill="#a0d8ef" opacity="0.4"/>
  <text x="140" y="400" text-anchor="middle" fill="#5b9bd5" font-family="Fredoka, sans-serif" font-size="14" font-weight="bold">鲸鱼座 🐋</text>
</svg>
