  <!-- Eyes -->
  <circle cx="132" cy="202" r="5" fill="#fff"/>
  <circle cx="148" cy="202" r="5" fill="#fff"/>
  <circle cx="134" cy="202" r="3" fill="#1a1a4e"/>
  <circle cx="146" cy="202" r="3" fill="#1a1a4e"/>
