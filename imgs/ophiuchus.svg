<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <!-- 蛇夫座：持蛇的医神，手持大蛇（巨蛇座） -->
  
  <!-- 大蛇（左侧） -->
  <path d="M 52 130 Q 60 115 75 118 Q 88 122 90 140 Q 92 158 80 165 Q 95 168 98 185 Q 100 200 92 210" 
        stroke="#3D9E3D" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- 蛇头（左） -->
  <ellipse cx="52" cy="130" rx="15" ry="11" fill="#3D9E3D" transform="rotate(-20,52,130)"/>
  <ellipse cx="46" cy="125" rx="4" ry="3" fill="#1A5C1A"/><!-- 眼睛 -->
  <path d="M 40 132 Q 37 130 35 133" stroke="#EF4444" stroke-width="2" fill="none"/><!-- 信子 -->
  <path d="M 40 132 Q 37 134 35 131" stroke="#EF4444" stroke-width="2" fill="none"/>
  
  <!-- 大蛇（右侧） -->
  <path d="M 228 130 Q 220 115 205 118 Q 192 122 190 140 Q 188 158 200 165 Q 185 168 182 185 Q 180 200 188 210" 
        stroke="#3D9E3D" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- 蛇头（右） -->
  <ellipse cx="228" cy="130" rx="15" ry="11" fill="#3D9E3D" transform="rotate(20,228,130)"/>
  <ellipse cx="234" cy="125" rx="4" ry="3" fill="#1A5C1A"/>
  <path d="M 240 132 Q 243 130 245 133" stroke="#EF4444" stroke-width="2" fill="none"/>
  <path d="M 240 132 Q 243 134 245 131" stroke="#EF4444" stroke-width="2" fill="none"/>
  
  <!-- 蛇鳞纹（左） -->
  <path d="M 70 125 Q 75 120 80 125" stroke="#2D7A2D" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 80 138 Q 86 133 90 140" stroke="#2D7A2D" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- 蛇鳞纹（右） -->
  <path d="M 210 125 Q 205 120 200 125" stroke="#2D7A2D" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 200 138 Q 194 133 190 140" stroke="#2D7A2D" stroke-width="1.5" fill="none" opacity="0.7"/>
  
  <!-- 人物 — 医神阿斯克勒庇俄斯 -->
  <!-- 长袍下摆 -->
  <path d="M 96 320 Q 90 380 85 405 L 195 405 Q 190 380 184 320 Z" 
        fill="#7BCFDA" stroke="#5AB5C4" stroke-width="2"/>
  <!-- 长袍 -->
  <rect x="100" y="235" width="80" height="92" rx="14" fill="#A5DEDE"/>
  <!-- 蛇杖标志 -->
  <line x1="140" y1="245" x2="140" y2="318" stroke="#FBBF24" stroke-width="3"/>
  <path d="M 140 258 Q 130 265 138 275 Q 150 285 140 295 Q 128 305 138 315" 
        stroke="#3D9E3D" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- 腰带 -->
  <rect x="110" y="315" width="60" height="12" rx="6" fill="#FBBF24"/>
  
  <!-- 手臂 -->
  <path d="M 100 250 Q 78 255 72 270 Q 66 288 75 305" stroke="#F5C67A" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 180 250 Q 202 255 208 270 Q 214 288 205 305" stroke="#F5C67A" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- 手 -->
  <circle cx="75" cy="308" r="13" fill="#F5C67A"/>
  <circle cx="205" cy="308" r="13" fill="#F5C67A"/>
  
  <!-- 颈部 -->
  <rect x="128" y="215" width="24" height="28" rx="12" fill="#F5C67A"/>
  
  <!-- 头部 -->
  <circle cx="140" cy="192" r="46" fill="#F5C67A" stroke="#E0A060" stroke-width="2.5"/>
  
  <!-- 头发（卷曲的古希腊风格） -->
  <path d="M 96 178 Q 94 145 108 128 Q 126 108 140 108 Q 154 108 172 128 Q 186 145 184 178" 
        fill="#8B6914" stroke="#6B4D0A" stroke-width="1.5"/>
  <!-- 卷发细节 -->
  <path d="M 100 175 Q 102 158 108 148 Q 104 155 100 168" fill="#7A5E14" opacity="0.5"/>
  <path d="M 180 175 Q 178 158 172 148 Q 176 155 180 168" fill="#7A5E14" opacity="0.5"/>
  
  <!-- 月桂叶冠 -->
  <path d="M 100 148 Q 110 138 120 132 Q 130 128 140 127 Q 150 128 160 132 Q 170 138 180 148" 
        stroke="#22C55E" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- 月桂叶 -->
  <ellipse cx="108" cy="144" rx="8" ry="4" fill="#16A34A" transform="rotate(-30,108,144)"/>
  <ellipse cx="120" cy="135" rx="8" ry="4" fill="#22C55E" transform="rotate(-15,120,135)"/>
  <ellipse cx="140" cy="130" rx="8" ry="4" fill="#16A34A"/>
  <ellipse cx="160" cy="135" rx="8" ry="4" fill="#22C55E" transform="rotate(15,160,135)"/>
  <ellipse cx="172" cy="144" rx="8" ry="4" fill="#16A34A" transform="rotate(30,172,144)"/>
  
  <!-- 脸部 -->
  <circle cx="125" cy="186" r="8" fill="#2D1A0E"/>
  <circle cx="155" cy="186" r="8" fill="#2D1A0E"/>
  <circle cx="127" cy="183" r="2.5" fill="white"/>
  <circle cx="157" cy="183" r="2.5" fill="white"/>
  <!-- 眉毛（智慧感） -->
  <path d="M 118 175 Q 125 172 132 175" stroke="#6B4D0A" stroke-width="2.5" fill="none"/>
  <path d="M 148 175 Q 155 172 162 175" stroke="#6B4D0A" stroke-width="2.5" fill="none"/>
  <!-- 胡须 -->
  <path d="M 120 215 Q 130 222 140 220 Q 150 222 160 215" stroke="#8B6914" stroke-width="3" fill="none"/>
  <path d="M 125 222 Q 140 230 155 222" stroke="#8B6914" stroke-width="2.5" fill="none"/>
  <!-- 鼻子 -->
  <ellipse cx="140" cy="200" rx="6" ry="5" fill="#E0A060"/>
</svg>