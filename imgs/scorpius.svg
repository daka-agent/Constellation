<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <!-- 天蝎座卡通形象 — 儿童友好风格 -->

  <!-- 蝎子尾巴（从身后弯起） -->
  <path d="M175 240 Q230 200 245 150 Q255 100 240 70 Q230 50 215 55 Q200 60 205 80 Q210 95 225 90"
        fill="none" stroke="#7C3AED" stroke-width="12" stroke-linecap="round"/>
  <!-- 尾针 -->
  <path d="M220 88 Q235 70 228 58" fill="none" stroke="#EF4444" stroke-width="8" stroke-linecap="round"/>
  <circle cx="226" cy="55" r="7" fill="#EF4444"/>

  <!-- 身体主体 -->
  <ellipse cx="130" cy="250" rx="68" ry="90" fill="#7C3AED" stroke="#5B21B6" stroke-width="3"/>

  <!-- 身体节段线 -->
  <line x1="65" y1="230" x2="195" y2="230" stroke="#5B21B6" stroke-width="2" opacity="0.5"/>
  <line x1="65" y1="260" x2="195" y2="260" stroke="#5B21B6" stroke-width="2" opacity="0.5"/>
  <line x1="68" y1="290" x2="192" y2="290" stroke="#5B21B6" stroke-width="2" opacity="0.5"/>

  <!-- 六条腿 -->
  <!-- 左腿 -->
  <path d="M80 230 Q50 215 30 200" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
  <path d="M75 255 Q45 250 22 240" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
  <path d="M75 278 Q48 280 28 278" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
  <!-- 右腿 -->
  <path d="M180 230 Q210 215 230 200" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
  <path d="M185 255 Q215 250 238 240" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
  <path d="M185 278 Q212 280 232 278" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>

  <!-- 蟹钳（前方） -->
  <path d="M85 190 Q60 170 45 155 Q35 145 38 132 Q42 122 52 125 Q60 128 58 140 Q56 150 66 148 Q76 146 78 135" fill="none" stroke="#6D28D9" stroke-width="7" stroke-linecap="round"/>
  <path d="M175 190 Q200 170 215 155 Q225 145 222 132 Q218 122 208 125 Q200 128 202 140 Q204 150 194 148 Q184 146 182 135" fill="none" stroke="#6D28D9" stroke-width="7" stroke-linecap="round"/>

  <!-- 头部 -->
  <circle cx="130" cy="175" r="52" fill="#8B5CF6" stroke="#5B21B6" stroke-width="3"/>

  <!-- 眼睛 -->
  <ellipse cx="112" cy="168" rx="14" ry="14" fill="white"/>
  <ellipse cx="148" cy="168" rx="14" ry="14" fill="white"/>
  <circle cx="114" cy="169" r="9" fill="#1C1917"/>
  <circle cx="150" cy="169" r="9" fill="#1C1917"/>
  <!-- 高光 -->
  <circle cx="117" cy="166" r="3.5" fill="white"/>
  <circle cx="153" cy="166" r="3.5" fill="white"/>

  <!-- 嘴巴 —— 威猛但可爱的小V形 -->
  <path d="M118 192 Q130 202 142 192" fill="none" stroke="#4C1D95" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 小触角 -->
  <path d="M112 125 Q105 105 100 92" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <circle cx="99" cy="90" r="5" fill="#FBBF24"/>
  <path d="M148 125 Q155 105 160 92" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <circle cx="161" cy="90" r="5" fill="#FBBF24"/>

  <!-- 身体花纹（亮紫斑点） -->
  <circle cx="115" cy="245" r="8" fill="#A78BFA" opacity="0.7"/>
  <circle cx="145" cy="255" r="7" fill="#A78BFA" opacity="0.7"/>
  <circle cx="128" cy="275" r="6" fill="#A78BFA" opacity="0.6"/>

  <!-- 星座符号 -->
  <text x="130" y="330" text-anchor="middle" font-size="18" fill="#FBBF24" font-family="serif" font-weight="bold">♏</text>
</svg>
