<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </radialGradient>
  </defs>
  <rect width="280" height="420" fill="url(#bgGrad)"/>
  <circle cx="60" cy="40" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="200" cy="55" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="40" cy="370" r="1" fill="#fff" opacity="0.5"/>
  <!-- Waves -->
  <path d="M0,340 Q40,325 80,340 Q120,355 160,340 Q200,325 240,340 Q260,355 280,340 L280,420 L0,420 Z" fill="#1a5276" opacity="0.5"/>
  <!-- Mast -->
  <rect x="137" y="100" width="6" height="250" rx="3" fill="#5a2d0c"/>
  <!-- Sail -->
  <path d="M143,110 L220,200 Q230,240 220,300 L143,340 Z" fill="#f8f9fa" stroke="#ddd" stroke-width="2"/>
  <path d="M143,110 L220,200 Q230,240 220,300 L143,340 Z" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <path d="M143,225 L195,225" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <!-- Curved wind lines -->
  <path d="M160,175 Q175,170 185,180" fill="none" stroke="#81ecec" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M155,260 Q170,255 180,265" fill="none" stroke="#81ecec" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Little face on sail -->
  <circle cx="170" cy="195" r="5" fill="#6c5ce7"/>
  <circle cx="190" cy="195" r="5" fill="#6c5ce7"/>
  <circle cx="171" cy="194" r="2.5" fill="#fff"/>
  <circle cx="191" cy="194" r="2.5" fill="#fff"/>
  <path d="M175,205 Q180,210 185,205" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
  <!-- Flag on top -->
  <path d="M140,100 L170,112 L140,124" fill="#e74c3c"/>
  <!-- Rope -->
  <line x1="140" y1="120" x2="80" y2="140" stroke="#8B4513" stroke-width="1.5" opacity="0.5"/>
  <text x="140" y="400" text-anchor="middle" fill="#81ecec" font-family="Fredoka, sans-serif" font-size="14" font-weight="bold">船帆座 ⛵</text>
</svg>
