  <line x1="45" y1="200" x2="95" y2="190" stroke="#ccc" stroke-width="1.5"/>
  <!-- Speed lines -->
  <line x1="150" y1="120" x2="180" y2="110" stroke="#FFD700" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="155" y1="135" x2="190" y2="128" stroke="#FFD700" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="148" y1="105" x2="170" y2="95" stroke="#FFD700" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Sparkle -->
  <polygon points="195,95 197,103 205,105 197,107 195,115 193,107 185,105 193,103" fill="#FFD700" opacity="0.8"/>
  <text x="140" y="400" text-anchor="middle" fill="#f39c12" font-family="Fredoka, sans-serif" font-size="14" font-weight="bold">天箭座 🏹</text>
