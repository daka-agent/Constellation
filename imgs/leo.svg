<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <!-- 狮子座卡通形象 — 儿童友好风格 -->
  <!-- 身体 -->
  <ellipse cx="140" cy="270" rx="62" ry="72" fill="#F59E0B" stroke="#D97706" stroke-width="3"/>
  <!-- 四肢 -->
  <!-- 前左腿 -->
  <rect x="90" y="310" width="28" height="68" rx="14" fill="#F59E0B" stroke="#D97706" stroke-width="2.5"/>
  <!-- 前右腿 -->
  <rect x="162" y="310" width="28" height="68" rx="14" fill="#F59E0B" stroke="#D97706" stroke-width="2.5"/>
  <!-- 后左腿 -->
  <rect x="80" y="320" width="26" height="60" rx="13" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
  <!-- 后右腿 -->
  <rect x="174" y="320" width="26" height="60" rx="13" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
  <!-- 爪子 前左 -->
  <ellipse cx="104" cy="380" rx="16" ry="10" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
  <!-- 爪子 前右 -->
  <ellipse cx="176" cy="380" rx="16" ry="10" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
  <!-- 尾巴 -->
  <path d="M200 300 Q240 250 250 200 Q255 170 240 160 Q230 155 225 165 Q220 180 230 185" fill="none" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
  <!-- 尾巴毛球 -->
  <circle cx="233" cy="153" r="14" fill="#92400E"/>
  <!-- 脖子 -->
  <ellipse cx="140" cy="210" rx="38" ry="28" fill="#F59E0B" stroke="#D97706" stroke-width="2.5"/>
  <!-- 鬃毛（大圆形背景） -->
  <circle cx="140" cy="160" r="72" fill="#92400E"/>
  <!-- 鬃毛花瓣效果 -->
  <ellipse cx="80"  cy="130" rx="20" ry="28" fill="#78350F" transform="rotate(-30 80 130)"/>
  <ellipse cx="68"  cy="165" rx="18" ry="26" fill="#78350F" transform="rotate(-60 68 165)"/>
  <ellipse cx="80"  cy="198" rx="18" ry="26" fill="#78350F" transform="rotate(-100 80 198)"/>
  <ellipse cx="200" cy="130" rx="20" ry="28" fill="#78350F" transform="rotate(30 200 130)"/>
  <ellipse cx="212" cy="165" rx="18" ry="26" fill="#78350F" transform="rotate(60 212 165)"/>
  <ellipse cx="200" cy="198" rx="18" ry="26" fill="#78350F" transform="rotate(100 200 198)"/>
  <ellipse cx="140" cy="102" rx="20" ry="26" fill="#78350F"/>
  <!-- 脸部底圆 -->
  <circle cx="140" cy="162" r="54" fill="#FCD34D"/>
  <!-- 耳朵 -->
  <polygon points="95,118 82,85 118,105" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <polygon points="185,118 198,85 162,105" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <!-- 耳朵内 -->
  <polygon points="95,115 86,92 112,108" fill="#FCA5A5"/>
  <polygon points="185,115 194,92 168,108" fill="#FCA5A5"/>
  <!-- 眼睛 -->
  <ellipse cx="120" cy="155" rx="13" ry="13" fill="white"/>
  <ellipse cx="160" cy="155" rx="13" ry="13" fill="white"/>
  <circle cx="122" cy="156" r="8" fill="#1C1917"/>
  <circle cx="162" cy="156" r="8" fill="#1C1917"/>
  <!-- 高光 -->
  <circle cx="125" cy="153" r="3" fill="white"/>
  <circle cx="165" cy="153" r="3" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="140" cy="174" rx="10" ry="7" fill="#D97706"/>
  <!-- 嘴巴 -->
  <path d="M128 183 Q140 192 152 183" fill="none" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="95" y1="172" x2="125" y2="176" stroke="#78350F" stroke-width="1.5"/>
  <line x1="95" y1="180" x2="125" y2="180" stroke="#78350F" stroke-width="1.5"/>
  <line x1="155" y1="176" x2="185" y2="172" stroke="#78350F" stroke-width="1.5"/>
  <line x1="155" y1="180" x2="185" y2="180" stroke="#78350F" stroke-width="1.5"/>
  <!-- 身体斑纹 -->
  <ellipse cx="125" cy="265" rx="10" ry="15" fill="#FBBF24" opacity="0.6"/>
  <ellipse cx="155" cy="260" rx="10" ry="15" fill="#FBBF24" opacity="0.6"/>
  <!-- 星座符号 -->
  <text x="140" y="310" text-anchor="middle" font-size="18" fill="#7C3AED" font-family="serif" font-weight="bold">♌</text>
</svg>
